<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study Not Found — STRANYOV</title>
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0a0a0a;
    color: #f0ede8;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 48px 32px;
    gap: 56px;
  }

  .glitch-bg {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(240,237,232,0.015) 2px, rgba(240,237,232,0.015) 4px);
    pointer-events: none; z-index: 0;
  }
  .noise {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  .content {
    position: relative; z-index: 1;
    text-align: center; max-width: 600px;
  }
  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.25em;
    color: rgba(240,237,232,0.35);
    margin-bottom: 48px; text-transform: uppercase;
  }
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 12vw, 120px);
    line-height: 0.9; letter-spacing: 0.02em;
    margin-bottom: 40px;
    -webkit-text-stroke: 1px rgba(240,237,232,0.15);
    color: transparent;
  }
  .headline span { display: block; color: #f0ede8; -webkit-text-stroke: 0; }
  .message {
    font-size: 14px; line-height: 1.7;
    color: rgba(240,237,232,0.5);
    margin-bottom: 56px; font-style: italic;
  }
  .back {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    color: rgba(240,237,232,0.6); text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(240,237,232,0.2);
    padding-bottom: 4px; transition: color 0.2s, border-color 0.2s;
  }
  .back:hover { color: #f0ede8; border-color: rgba(240,237,232,0.6); }

  /* ── GAME ── */
  .game {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 18px;
  }
  .game-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.25em;
    color: rgba(240,237,232,0.2); text-transform: uppercase;
  }

  /* difficulty */
  .diff-btns {
    display: flex; gap: 2px;
    background: rgba(240,237,232,0.06);
    border: 1px solid rgba(240,237,232,0.08);
    padding: 3px;
  }
  .diff-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 14px; background: none; border: none;
    color: rgba(240,237,232,0.3); cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  .diff-btn:hover { color: rgba(240,237,232,0.7); }
  .diff-btn.active { background: rgba(240,237,232,0.1); color: #f0ede8; }

  .game-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    color: rgba(240,237,232,0.45); text-transform: uppercase;
    min-height: 16px; transition: opacity 0.3s;
  }

  .board {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: rgba(240,237,232,0.08);
    border: 1px solid rgba(240,237,232,0.08); position: relative;
  }
  .board-end {
    position: absolute; inset: 0;
    background: rgba(10,10,10,0.85);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; z-index: 2;
  }
  .board-end.visible { display: flex; }
  .board-end-msg {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: rgba(240,237,232,0.5); text-transform: uppercase;
  }
  .lb-save-wrap {
    display: flex; gap: 6px; align-items: center;
  }
  .lb-name-inp {
    font-family: 'DM Mono', monospace; font-size: 11px;
    background: rgba(240,237,232,0.06);
    border: 1px solid rgba(240,237,232,0.18);
    color: #f0ede8; padding: 5px 8px; outline: none;
    width: 110px; letter-spacing: 0.05em;
    transition: border-color 0.2s;
  }
  .lb-name-inp::placeholder { color: rgba(240,237,232,0.2); }
  .lb-name-inp:focus { border-color: rgba(240,237,232,0.5); }
  .lb-save-btn {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    background: rgba(240,237,232,0.1);
    border: 1px solid rgba(240,237,232,0.2);
    color: rgba(240,237,232,0.7); padding: 5px 10px;
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .lb-save-btn:hover { background: rgba(240,237,232,0.18); color: #f0ede8; }

  .cell {
    width: 80px; height: 80px; background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 0.02em;
    cursor: pointer; transition: background 0.15s, color 0.15s;
    color: transparent; user-select: none;
  }
  .cell:hover:not(.taken) { background: rgba(240,237,232,0.04); }
  .cell.x { color: #f0ede8; }
  .cell.o { color: rgba(240,237,232,0.35); }
  .cell.win { background: rgba(240,237,232,0.07); color: #f0ede8 !important; }

  .game-reset {
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.25em; color: rgba(240,237,232,0.55);
    text-transform: uppercase; background: none; border: none;
    border-bottom: 1px solid rgba(240,237,232,0.25);
    padding-bottom: 4px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .game-reset:hover { color: #f0ede8; border-color: rgba(240,237,232,0.7); }

  .score {
    display: flex; gap: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    color: rgba(240,237,232,0.25); text-transform: uppercase;
  }
  .score span { color: rgba(240,237,232,0.55); }

  /* ── LEADERBOARD ── */
  .lb-section {
    position: relative; z-index: 1;
    width: 100%; max-width: 340px;
  }
  .lb-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(240,237,232,0.08);
  }
  .lb-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.28em;
    color: rgba(240,237,232,0.2); text-transform: uppercase;
  }
  .lb-clear {
    font-family: 'DM Mono', monospace; font-size: 8px;
    letter-spacing: 0.12em; text-transform: uppercase;
    background: none; border: none; cursor: pointer;
    color: rgba(240,237,232,0.15); padding: 0;
    transition: color 0.2s;
  }
  .lb-clear:hover { color: rgba(240,237,232,0.5); }
  .lb-empty {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; color: rgba(240,237,232,0.15);
    text-align: center; padding: 16px 0; text-transform: uppercase;
  }
  .lb-row {
    display: flex; align-items: center; gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(240,237,232,0.05);
  }
  .lb-rank {
    font-family: 'DM Mono', monospace; font-size: 9px;
    color: rgba(240,237,232,0.2); width: 18px; flex-shrink: 0;
    text-align: right;
  }
  .lb-rank.gold   { color: #c8a84b; }
  .lb-rank.silver { color: rgba(240,237,232,0.5); }
  .lb-rank.bronze { color: #a0745a; }
  .lb-player {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: rgba(240,237,232,0.7); flex: 1;
    letter-spacing: 0.04em; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .lb-wins {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: rgba(240,237,232,0.4); flex-shrink: 0;
  }
  .lb-diff-tag {
    font-family: 'DM Mono', monospace; font-size: 8px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(240,237,232,0.2); flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="noise"></div>
  <div class="glitch-bg"></div>

  <div class="content">
    <div class="label">Case Study · Not Found</div>
    <div class="headline">
      LOST<br>
      <span>SOMEWHERE</span>
    </div>
    <p class="message">
      "This one's somewhere between a post-show debrief,<br>
      a hard drive that didn't survive the tour,<br>
      and a producer who said it's all NDA."
    </p>
    <a href="index.html#work" class="back">← Back to projects</a>
  </div>

  <div class="game">
    <div class="game-label">Kill time · X vs O</div>
    <div class="diff-btns">
      <button class="diff-btn" data-diff="easy">Easy</button>
      <button class="diff-btn active" data-diff="medium">Medium</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
    </div>
    <div class="game-status" id="status">Your turn — X</div>
    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
      <div class="board-end" id="boardEnd">
        <div class="board-end-msg" id="boardEndMsg"></div>
        <div class="lb-save-wrap" id="lbSaveWrap" style="display:none">
          <input class="lb-name-inp" id="lbNameInp" placeholder="Your name" maxlength="20">
          <button class="lb-save-btn" id="lbSaveBtn">Save</button>
        </div>
        <button class="game-reset" id="reset">New game</button>
      </div>
    </div>
    <div class="score">
      You <span id="score-x">0</span> &nbsp;·&nbsp; CPU <span id="score-o">0</span> &nbsp;·&nbsp; Draw <span id="score-d">0</span>
    </div>
  </div>

  <div class="lb-section">
    <div class="lb-header">
      <div class="lb-title">Leaderboard</div>
      <button class="lb-clear" id="lbClear">Clear</button>
    </div>
    <div id="lbList"></div>
  </div>

<script>
  // ── FIREBASE CONFIG ────────────────────────────────────────
  // Setup: console.firebase.google.com → New project → Realtime Database
  // → Create database → Start in test mode → copy URL below
  const FB_URL = 'https://test123-8f255-default-rtdb.europe-west1.firebasedatabase.app/ttt_lb';
  const USE_FB = !FB_URL.includes('YOUR_PROJECT');

  // ── GAME STATE ─────────────────────────────────────────────
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board, locked, difficulty = 'medium';
  let scores = {x:0, o:0, d:0};

  const cells       = document.querySelectorAll('.cell');
  const status      = document.getElementById('status');
  const scoreX      = document.getElementById('score-x');
  const scoreO      = document.getElementById('score-o');
  const scoreD      = document.getElementById('score-d');
  const boardEnd    = document.getElementById('boardEnd');
  const boardEndMsg = document.getElementById('boardEndMsg');
  const lbSaveWrap  = document.getElementById('lbSaveWrap');
  const lbNameInp   = document.getElementById('lbNameInp');
  const lbSaveBtn   = document.getElementById('lbSaveBtn');
  const lbList      = document.getElementById('lbList');

  // ── DIFFICULTY ─────────────────────────────────────────────
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
      init();
    });
  });

  // ── BOARD ──────────────────────────────────────────────────
  function init() {
    board = Array(9).fill('');
    locked = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    boardEnd.classList.remove('visible');
    lbSaveWrap.style.display = 'none';
    lbNameInp.value = '';
    status.textContent = 'Your turn — X';
  }

  function checkWinner(b) {
    for (const [a, c, d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
    }
    if (b.every(v => v)) return { winner: 'draw' };
    return null;
  }

  // ── AI ─────────────────────────────────────────────────────
  function minimax(b, isMax) {
    const res = checkWinner(b);
    if (res) return res.winner === 'o' ? 1 : res.winner === 'x' ? -1 : 0;
    let best = isMax ? -Infinity : Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = isMax ? 'o' : 'x';
        const s = minimax(b, !isMax);
        b[i] = '';
        best = isMax ? Math.max(best, s) : Math.min(best, s);
      }
    }
    return best;
  }

  function randomMove() {
    const empty = board.map((v,i) => v?null:i).filter(i=>i!==null);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function bestMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'o';
        const s = minimax(board, false);
        board[i] = '';
        if (s > best) { best = s; move = i; }
      }
    }
    return move;
  }

  // error rates: easy=75% random, medium=50%, hard=25%
  const ERROR_RATE = { easy: 0.50, medium: 0.30, hard: 0.10 };

  function cpuMove() {
    const move = Math.random() < ERROR_RATE[difficulty] ? randomMove() : bestMove();
    if (move == null || move === -1) return;
    board[move] = 'o';
    cells[move].textContent = 'O';
    cells[move].classList.add('o', 'taken');
    resolve();
  }

  function resolve() {
    const res = checkWinner(board);
    if (res) {
      if (res.winner === 'draw') {
        status.textContent = 'Draw — not bad';
        boardEndMsg.textContent = 'Draw';
        scores.d++; scoreD.textContent = scores.d;
      } else {
        const win = res.winner === 'x';
        status.textContent = win ? 'You win — respect' : 'CPU wins — try again';
        boardEndMsg.textContent = win ? 'You win' : 'CPU wins';
        res.line.forEach(i => cells[i].classList.add('win'));
        if (win) { scores.x++; scoreX.textContent = scores.x; lbSaveWrap.style.display = 'flex'; }
        else      { scores.o++; scoreO.textContent = scores.o; }
      }
      locked = true;
      setTimeout(() => boardEnd.classList.add('visible'), 400);
      return;
    }
    status.textContent = 'Your turn — X';
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (locked || board[i]) return;
      board[i] = 'x';
      cell.textContent = 'X';
      cell.classList.add('x', 'taken');
      if (checkWinner(board)) { resolve(); return; }
      status.textContent = 'CPU thinking...';
      locked = true;
      setTimeout(() => { locked = false; cpuMove(); }, 300);
    });
  });

  document.getElementById('reset').addEventListener('click', init);

  // ── LEADERBOARD · FIREBASE + localStorage fallback ─────────
  function fbKey(name) {
    return name.toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0, 40);
  }

  async function lbLoad() {
    if (USE_FB) {
      try {
        const res = await fetch(FB_URL + '.json');
        const obj = await res.json();
        if (!obj) return [];
        return Object.values(obj).sort((a,b) => b.wins - a.wins);
      } catch { /* fall through */ }
    }
    try { return JSON.parse(localStorage.getItem('ttt_lb')) || []; }
    catch { return []; }
  }

  async function lbSaveEntry(name, diff) {
    const key = fbKey(name);
    if (USE_FB) {
      try {
        const res = await fetch(`${FB_URL}/${key}.json`);
        const existing = await res.json();
        const entry = existing
          ? { ...existing, wins: existing.wins + 1, diff }
          : { name, wins: 1, diff };
        await fetch(`${FB_URL}/${key}.json`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(entry)
        });
        return;
      } catch { /* fall through to localStorage */ }
    }
    // localStorage fallback
    const data = JSON.parse(localStorage.getItem('ttt_lb') || '[]');
    const ex = data.find(e => fbKey(e.name) === key);
    if (ex) { ex.wins++; ex.diff = diff; }
    else data.push({ name, wins: 1, diff });
    data.sort((a,b) => b.wins - a.wins);
    localStorage.setItem('ttt_lb', JSON.stringify(data));
  }

  async function lbClearAll() {
    if (USE_FB) {
      try { await fetch(FB_URL + '.json', { method: 'DELETE' }); }
      catch { /* ignore */ }
    }
    localStorage.removeItem('ttt_lb');
  }

  function renderLBData(data) {
    if (!data.length) {
      lbList.innerHTML = '<div class="lb-empty">No records yet</div>';
      return;
    }
    const medal = ['gold','silver','bronze'];
    lbList.innerHTML = data.slice(0, 10).map((e, i) => `
      <div class="lb-row">
        <div class="lb-rank ${medal[i]||''}">${i+1}</div>
        <div class="lb-player">${e.name}</div>
        <div class="lb-diff-tag">${e.diff}</div>
        <div class="lb-wins">${e.wins}W</div>
      </div>`).join('');
  }

  async function renderLB() {
    lbList.innerHTML = '<div class="lb-empty">Loading…</div>';
    renderLBData(await lbLoad());
  }

  lbSaveBtn.addEventListener('click', async () => {
    const name = lbNameInp.value.trim();
    if (!name) return;
    lbSaveBtn.textContent = '...';
    lbSaveBtn.disabled = true;
    await lbSaveEntry(name, difficulty);
    lbSaveWrap.style.display = 'none';
    lbNameInp.value = '';
    lbSaveBtn.textContent = 'Save';
    lbSaveBtn.disabled = false;
    renderLB();
  });

  lbNameInp.addEventListener('keydown', e => { if (e.key === 'Enter') lbSaveBtn.click(); });

  document.getElementById('lbClear').addEventListener('click', async () => {
    if (!confirm('Clear leaderboard?')) return;
    await lbClearAll();
    renderLB();
  });

  renderLB();
  init();
</script>
</body>
</html>
