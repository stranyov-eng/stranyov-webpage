<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Test Pattern Generator — STRANYOV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f0ede8;
    --gray: #888;
    --line: rgba(240,237,232,0.1);
    --panel: #111;
    --input-bg: #1a1a1a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 20px; }
  .back-link {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(240,237,232,0.35);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--white); }
  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.1em;
  }
  .topbar-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(240,237,232,0.35);
    border: 1px solid rgba(240,237,232,0.15);
    padding: 3px 10px;
    text-transform: uppercase;
  }
  .resolution-display {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(240,237,232,0.5);
    letter-spacing: 0.1em;
  }
  .resolution-display span { color: var(--white); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(240,237,232,0.1); }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(240,237,232,0.25);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .field-group { display: flex; flex-direction: column; gap: 10px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(240,237,232,0.4);
  }
  .field input[type="number"] {
    background: var(--input-bg);
    border: 1px solid rgba(240,237,232,0.1);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .field input[type="number"]:focus { border-color: rgba(240,237,232,0.4); }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* divider */
  .divider { height: 1px; background: var(--line); }

  /* PATTERN GRID */
  .pattern-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .pattern-btn {
    background: var(--input-bg);
    border: 1px solid rgba(240,237,232,0.08);
    color: rgba(240,237,232,0.45);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    line-height: 1.4;
  }
  .pattern-btn:hover { border-color: rgba(240,237,232,0.3); color: var(--white); }
  .pattern-btn.active {
    border-color: var(--white);
    color: var(--white);
    background: rgba(240,237,232,0.06);
  }
  .pattern-btn .btn-icon {
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
    opacity: 0.6;
  }

  /* BRIGHTNESS */
  .brightness-wrap { display: flex; flex-direction: column; gap: 8px; }
  .brightness-row { display: flex; justify-content: space-between; align-items: center; }
  .brightness-val {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--white);
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: rgba(240,237,232,0.15);
    outline: none;
    border-radius: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--white);
    border-radius: 50%;
    cursor: pointer;
  }

  /* ACTIONS */
  .btn-download {
    width: 100%;
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-download:hover { opacity: 0.85; }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: rgba(240,237,232,0.4);
    border: 1px solid rgba(240,237,232,0.15);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 6px;
  }
  .btn-secondary:hover { border-color: rgba(240,237,232,0.4); color: var(--white); }

  /* CANVAS AREA */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    overflow: hidden;
    position: relative;
  }
  .canvas-wrap {
    position: relative;
    box-shadow: 0 0 0 1px rgba(240,237,232,0.08);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  .canvas-info {
    position: absolute;
    bottom: 16px; right: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(240,237,232,0.2);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="../index.html" class="back-link">← stranyov.com</a>
    <div class="topbar-title">LED TEST PATTERNS</div>
    <div class="topbar-badge">Generator</div>
  </div>
  <div class="resolution-display">
    Total: <span id="totalRes">—</span>
  </div>
</div>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- MODULE SIZE -->
    <div>
      <div class="section-label">Module Resolution (px)</div>
      <div class="field-group row-2">
        <div class="field">
          <label>Width</label>
          <input type="number" id="modW" value="96" min="1" max="1024">
        </div>
        <div class="field">
          <label>Height</label>
          <input type="number" id="modH" value="96" min="1" max="1024">
        </div>
      </div>
    </div>

    <!-- MODULE COUNT -->
    <div>
      <div class="section-label">Module Count</div>
      <div class="field-group row-2">
        <div class="field">
          <label>Columns</label>
          <input type="number" id="cols" value="6" min="1" max="64">
        </div>
        <div class="field">
          <label>Rows</label>
          <input type="number" id="rows" value="4" min="1" max="64">
        </div>
      </div>
    </div>

    <!-- PIXEL PITCH -->
    <div>
      <div class="section-label">Pixel Pitch</div>
      <div class="field">
        <label>Pitch (mm)</label>
        <input type="number" id="pitch" value="3.9" min="0.1" max="50" step="0.1">
      </div>
    </div>

    <div class="divider"></div>

    <!-- PATTERNS -->
    <div>
      <div class="section-label">Pattern</div>
      <div class="pattern-grid">
        <button class="pattern-btn active" data-pattern="white">
          <span class="btn-icon">□</span>White Field
        </button>
        <button class="pattern-btn" data-pattern="black">
          <span class="btn-icon">■</span>Black Field
        </button>
        <button class="pattern-btn" data-pattern="red">
          <span class="btn-icon" style="color:#f44;">■</span>Red Field
        </button>
        <button class="pattern-btn" data-pattern="green">
          <span class="btn-icon" style="color:#4f4;">■</span>Green Field
        </button>
        <button class="pattern-btn" data-pattern="blue">
          <span class="btn-icon" style="color:#44f;">■</span>Blue Field
        </button>
        <button class="pattern-btn" data-pattern="colorbars">
          <span class="btn-icon">▦</span>Color Bars
        </button>
        <button class="pattern-btn" data-pattern="grayscale">
          <span class="btn-icon">▤</span>Grayscale
        </button>
        <button class="pattern-btn" data-pattern="grid">
          <span class="btn-icon">⊞</span>Module Grid
        </button>
        <button class="pattern-btn" data-pattern="crosshatch">
          <span class="btn-icon">⊕</span>Crosshatch
        </button>
        <button class="pattern-btn" data-pattern="checkerboard">
          <span class="btn-icon">⊟</span>Checker
        </button>
        <button class="pattern-btn" data-pattern="deadpixel">
          <span class="btn-icon">⁙</span>Dead Pixel
        </button>
        <button class="pattern-btn" data-pattern="gradient">
          <span class="btn-icon">◫</span>Gradient
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- BRIGHTNESS -->
    <div>
      <div class="section-label">Brightness</div>
      <div class="brightness-wrap">
        <div class="brightness-row">
          <label class="section-label" style="margin:0;">Level</label>
          <div class="brightness-val"><span id="brightnessVal">100</span>%</div>
        </div>
        <input type="range" id="brightness" min="0" max="100" value="100">
      </div>
    </div>

    <div class="divider"></div>

    <!-- ACTIONS -->
    <div style="display:flex;flex-direction:column;gap:6px;">
      <button class="btn-download" id="btnDownload">↓ Download PNG</button>
      <button class="btn-secondary" id="btnFullscreen">⤢ Fullscreen Preview</button>
    </div>

  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
    <div class="canvas-info" id="canvasInfo"></div>
  </div>

</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const inputs = {
    modW: document.getElementById('modW'),
    modH: document.getElementById('modH'),
    cols: document.getElementById('cols'),
    rows: document.getElementById('rows'),
    pitch: document.getElementById('pitch'),
    brightness: document.getElementById('brightness'),
  };

  let currentPattern = 'white';

  function getParams() {
    return {
      modW: parseInt(inputs.modW.value) || 96,
      modH: parseInt(inputs.modH.value) || 96,
      cols: parseInt(inputs.cols.value) || 6,
      rows: parseInt(inputs.rows.value) || 4,
      pitch: parseFloat(inputs.pitch.value) || 3.9,
      brightness: parseInt(inputs.brightness.value) / 100,
    };
  }

  function applyBrightness(r, g, b, br) {
    return [Math.round(r * br), Math.round(g * br), Math.round(b * br)];
  }

  function drawPattern() {
    const p = getParams();
    const W = p.modW * p.cols;
    const H = p.modH * p.rows;
    canvas.width = W;
    canvas.height = H;

    const br = p.brightness;

    switch (currentPattern) {
      case 'white': {
        const [r,g,b] = applyBrightness(255,255,255,br);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0,0,W,H);
        break;
      }
      case 'black': {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,W,H);
        break;
      }
      case 'red': {
        const [r,g,b] = applyBrightness(255,0,0,br);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0,0,W,H);
        break;
      }
      case 'green': {
        const [r,g,b] = applyBrightness(0,255,0,br);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0,0,W,H);
        break;
      }
      case 'blue': {
        const [r,g,b] = applyBrightness(0,0,255,br);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0,0,W,H);
        break;
      }
      case 'colorbars': {
        const bars = [
          [255,255,255], [255,255,0], [0,255,255], [0,255,0],
          [255,0,255],   [255,0,0],   [0,0,255],   [0,0,0]
        ];
        const bw = W / bars.length;
        bars.forEach(([r,g,b], i) => {
          const [cr,cg,cb] = applyBrightness(r,g,b,br);
          ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
          ctx.fillRect(Math.round(i * bw), 0, Math.round(bw), H);
        });
        break;
      }
      case 'grayscale': {
        const steps = 10;
        const sw = W / steps;
        for (let i = 0; i < steps; i++) {
          const v = Math.round((i / (steps - 1)) * 255 * br);
          ctx.fillStyle = `rgb(${v},${v},${v})`;
          ctx.fillRect(Math.round(i * sw), 0, Math.round(sw) + 1, H);
        }
        break;
      }
      case 'grid': {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,W,H);
        ctx.strokeStyle = `rgba(255,255,255,${br})`;
        ctx.lineWidth = 1;
        for (let c = 0; c <= p.cols; c++) {
          ctx.beginPath();
          ctx.moveTo(c * p.modW, 0);
          ctx.lineTo(c * p.modW, H);
          ctx.stroke();
        }
        for (let r = 0; r <= p.rows; r++) {
          ctx.beginPath();
          ctx.moveTo(0, r * p.modH);
          ctx.lineTo(W, r * p.modH);
          ctx.stroke();
        }
        // draw module numbers
        const fontSize = Math.min(p.modW, p.modH) * 0.25;
        if (fontSize >= 6) {
          ctx.fillStyle = `rgba(255,255,255,${br * 0.4})`;
          ctx.font = `${fontSize}px DM Mono, monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          for (let r = 0; r < p.rows; r++) {
            for (let c = 0; c < p.cols; c++) {
              ctx.fillText(`${c+1}×${r+1}`, c * p.modW + p.modW/2, r * p.modH + p.modH/2);
            }
          }
        }
        break;
      }
      case 'crosshatch': {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,W,H);
        ctx.strokeStyle = `rgba(255,255,255,${br})`;
        ctx.lineWidth = 1;
        // pixel grid every modW/modH
        for (let c = 0; c <= p.cols; c++) {
          ctx.beginPath();
          ctx.moveTo(c * p.modW, 0);
          ctx.lineTo(c * p.modW, H);
          ctx.stroke();
        }
        for (let r = 0; r <= p.rows; r++) {
          ctx.beginPath();
          ctx.moveTo(0, r * p.modH);
          ctx.lineTo(W, r * p.modH);
          ctx.stroke();
        }
        // center cross
        ctx.strokeStyle = `rgba(255,0,0,${br})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
        // diagonals
        ctx.strokeStyle = `rgba(255,255,255,${br * 0.3})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W,H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(0,H); ctx.stroke();
        break;
      }
      case 'checkerboard': {
        for (let r = 0; r < p.rows; r++) {
          for (let c = 0; c < p.cols; c++) {
            const on = (r + c) % 2 === 0;
            const v = on ? Math.round(255 * br) : 0;
            ctx.fillStyle = `rgb(${v},${v},${v})`;
            ctx.fillRect(c * p.modW, r * p.modH, p.modW, p.modH);
          }
        }
        break;
      }
      case 'deadpixel': {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,W,H);
        const v = Math.round(255 * br);
        ctx.fillStyle = `rgb(${v},${v},${v})`;
        const spacing = Math.max(4, Math.min(p.modW, p.modH) / 4);
        for (let y = spacing; y < H; y += spacing) {
          for (let x = spacing; x < W; x += spacing) {
            ctx.fillRect(Math.round(x), Math.round(y), 1, 1);
          }
        }
        break;
      }
      case 'gradient': {
        const grad = ctx.createLinearGradient(0,0,W,0);
        grad.addColorStop(0, `rgb(0,0,0)`);
        grad.addColorStop(1, `rgb(${Math.round(255*br)},${Math.round(255*br)},${Math.round(255*br)})`);
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,W,H);
        break;
      }
    }

    updateInfo(p, W, H);
    fitCanvas();
  }

  function updateInfo(p, W, H) {
    const totalPx = W * H;
    document.getElementById('totalRes').textContent = `${W} × ${H} px`;
    const physW = ((p.modW * p.cols * p.pitch) / 10).toFixed(1);
    const physH = ((p.modH * p.rows * p.pitch) / 10).toFixed(1);
    document.getElementById('canvasInfo').textContent =
      `${W}×${H}px · ${physW}×${physH}cm · pitch ${p.pitch}mm`;
  }

  function fitCanvas() {
    const area = document.getElementById('canvasArea');
    const wrap = document.getElementById('canvasWrap');
    const pad = 48;
    const aW = area.clientWidth - pad;
    const aH = area.clientHeight - pad;
    const cW = canvas.width;
    const cH = canvas.height;
    if (!cW || !cH) return;
    const scale = Math.min(aW / cW, aH / cH, 1);
    canvas.style.width = Math.round(cW * scale) + 'px';
    canvas.style.height = Math.round(cH * scale) + 'px';
  }

  // events
  Object.values(inputs).forEach(el => el.addEventListener('input', drawPattern));

  inputs.brightness.addEventListener('input', () => {
    document.getElementById('brightnessVal').textContent = inputs.brightness.value;
  });

  document.querySelectorAll('.pattern-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPattern = btn.dataset.pattern;
      drawPattern();
    });
  });

  document.getElementById('btnDownload').addEventListener('click', () => {
    const p = getParams();
    const W = p.modW * p.cols;
    const H = p.modH * p.rows;
    const link = document.createElement('a');
    link.download = `LED_${currentPattern}_${W}x${H}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  document.getElementById('btnFullscreen').addEventListener('click', () => {
    document.getElementById('canvasArea').requestFullscreen?.();
  });

  window.addEventListener('resize', fitCanvas);

  drawPattern();
</script>
</body>
</html>
